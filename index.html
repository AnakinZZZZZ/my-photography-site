<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOYAGER — Photography Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Bauhaus Geometric Decorations -->
  <div class="bauhaus-deco bauhaus-deco--circle"></div>
  <div class="bauhaus-deco bauhaus-deco--triangle"></div>
  <div class="bauhaus-deco bauhaus-deco--square"></div>

  <div class="page-content">
    <!-- Header -->
    <header class="site-header">
      <h1 class="site-title" id="siteTitle">VOYAGER</h1>
      <p class="site-tagline" id="siteTagline">A Visual Journey Through Time & Space</p>
    </header>

    <!-- Album Grid -->
    <main class="album-grid" id="albumGrid">
      <!-- Cards will be dynamically generated by JS -->
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <p class="site-footer__text" id="footerText">&copy; 2024 VOYAGER</p>
      <div class="site-footer__social" id="footerSocial">
        <!-- Social links generated by JS -->
      </div>
    </footer>
  </div>

  <script src="albums/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
