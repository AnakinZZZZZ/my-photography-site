<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOYAGER — Photography Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Bauhaus Geometric Decorations -->
  <div class="bauhaus-deco bauhaus-deco--circle"></div>
  <div class="bauhaus-deco bauhaus-deco--triangle"></div>
  <div class="bauhaus-deco bauhaus-deco--square"></div>

  <div class="page-content">
    <!-- Header -->
    <header class="site-header">
      <h1 class="site-title" id="siteTitle">VOYAGER</h1>
      <p class="site-tagline" id="siteTagline">A Visual Journey Through Time & Space</p>
    </header>

    <!-- Album Grid -->
    <main class="album-grid" id="albumGrid">
      <!-- Cards will be dynamically generated by JS -->
    </main>

    <!-- Travel Map Section -->
    <section class="travel-map-section" id="travelMapSection">
      <h2 class="travel-map__title">DESTINATIONS</h2>
      <p class="travel-map__subtitle">Where I've Been</p>
      <div class="travel-map__container">
        <svg class="travel-map__svg" id="travelMapSVG" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
          <!-- World map paths and markers will be rendered by JS -->
        </svg>
        <div class="travel-map__tooltip" id="mapTooltip">
          <div class="travel-map__tooltip-img" id="tooltipImg"></div>
          <div class="travel-map__tooltip-info">
            <span class="travel-map__tooltip-title" id="tooltipTitle"></span>
            <span class="travel-map__tooltip-date" id="tooltipDate"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
      <p class="site-footer__text" id="footerText">&copy; 2024 VOYAGER</p>
      <div class="site-footer__social" id="footerSocial">
        <!-- Social links generated by JS -->
      </div>
    </footer>
  </div>

  <script src="albums/data.js"></script>
  <script src="js/worldmap.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
