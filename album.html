<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album — VOYAGER</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Bauhaus Geometric Decorations -->
  <div class="bauhaus-deco bauhaus-deco--circle"></div>
  <div class="bauhaus-deco bauhaus-deco--triangle"></div>

  <div class="page-content">
    <!-- Album Header -->
    <header class="album-header">
      <a href="index.html" class="album-header__back">
        <span>&larr;</span> BACK
      </a>
      <div>
        <h1 class="album-header__title" id="albumTitle">ALBUM</h1>
        <p class="album-header__subtitle" id="albumSubtitle"></p>
      </div>
      <div class="album-header__details">
        <div id="albumDate"></div>
        <div id="albumLocation"></div>
      </div>
    </header>

    <!-- Masonry Grid -->
    <main class="masonry-grid" id="masonryGrid">
      <!-- Photos will be dynamically generated by JS -->
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <p class="site-footer__text">&copy; 2024 VOYAGER</p>
    </footer>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lightboxClose">&times;</button>
    <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev">&lsaquo;</button>
    <button class="lightbox__nav lightbox__nav--next" id="lightboxNext">&rsaquo;</button>
    <img class="lightbox__img" id="lightboxImg" src="" alt="">
    <p class="lightbox__caption" id="lightboxCaption"></p>
    <span class="lightbox__counter" id="lightboxCounter"></span>
  </div>

  <script src="albums/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
